services:
  huobao-drama:
    build: .
    container_name: huobao-drama
    ports:
      - "5679:5679"
    volumes:
      - ./data:/app/data
      - ./configs/config.yaml:/app/configs/config.yaml
    environment:
      - NODE_ENV=production
      - PORT=5679
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

